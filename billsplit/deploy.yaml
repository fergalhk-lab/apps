name: billsplit

generatedSecrets:
  - name: jwt-signing
    length: 1024
    symbols: false

services:
  - name: billsplit
    image: &image
      repository: 740994137039.dkr.ecr.eu-west-1.amazonaws.com/apps/billsplit
      tag: 14af80ddba8c65f2150fd19a9250a1898fb90f9a
    resources:
      cpu: "20m"
      memory: "64Mi"
    command: ["/usr/local/bin/billsplit"]
    iamRoleARN: "arn:aws:iam::740994137039:role/k8s-mgmt-billsplit"
    env: &env
      - name: AWS_REGION
        rawValue: eu-west-1
      - name: S3_BUCKET
        rawValue: "fergalhk-billsplit-live"
      - name: SECURE_COOKIE
        rawValue: "true"
      - name: JWT_SECRET
        fromGeneratedSecret: jwt-signing
    ingress:
      port: 8080
      public:
        domain: billsplit.fergal.website

