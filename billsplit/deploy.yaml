cronJobs:
  - name: fxrates-sync
    image: *image
    resources:
      cpu: "20m"
      memory: "64Mi"
    command: ["/usr/local/bin/fxrates-sync"]
    iamRoleARN: "arn:aws:iam::740994137039:role/k8s-mgmt-billsplit"
    env: *env
    schedule: "0 0 * * *"
