name: billsplit

services:
  - name: billsplit
    image: &image
      repository: 740994137039.dkr.ecr.eu-west-1.amazonaws.com/apps/billsplit
      tag: 0dbfd113b81d74ba179c3a989db8be7248b27979
    resources:
      cpu: "20m"
      memory: "64Mi"
    command: ["/usr/local/bin/billsplit"]
    iamRoleARN: "arn:aws:iam::740994137039:role/k8s-mgmt-billsplit"
    env: &env
      - name: AWS_REGION
        rawValue: eu-west-1
      - name: S3_BUCKET
        rawValue: "fergalhk-billsplit-live"
      - name: JWT_SECRET
        fromSecret:
          name: auth
          key: jwt-secret
    ingress:
      port: 8080
      public:
        domain: billsplit.fergal.website

initJobs:
  - name: seed
    image: *image
    resources:
      cpu: "20m"
      memory: "64Mi"
    command: ["/usr/local/bin/seed"]
    args: ["-initial"]
    iamRoleARN: "arn:aws:iam::740994137039:role/k8s-mgmt-billsplit"
    env: *env

cronJobs:
  - name: fxrates-sync
    image: *image
    resources:
      cpu: "20m"
      memory: "64Mi"
    command: ["/usr/local/bin/fxrates-sync"]
    iamRoleARN: "arn:aws:iam::740994137039:role/k8s-mgmt-billsplit"
    env: *env
    schedule: "0 0 * * *"
