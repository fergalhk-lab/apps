name: billsplit

services:
  - name: billsplit
    image:
      repository: 740994137039.dkr.ecr.eu-west-1.amazonaws.com/apps/billsplit
      tag: latest
    resources:
      cpu: "100m"
      memory: "128Mi"
    command: ["/usr/local/bin/billsplit"]
    ingress:
      port: 8080
      public:
        domain: billsplit.fergal.website

initJobs:
  - name: seed
    image:
      repository: 740994137039.dkr.ecr.eu-west-1.amazonaws.com/apps/billsplit
      tag: latest
    resources:
      cpu: "100m"
      memory: "128Mi"
    command: ["/usr/local/bin/seed"]
    args: ["-initial"]

cronJobs:
  - name: fxrates-sync
    image:
      repository: 740994137039.dkr.ecr.eu-west-1.amazonaws.com/apps/billsplit
      tag: latest
    resources:
      cpu: "100m"
      memory: "128Mi"
    command: ["/usr/local/bin/fxrates-sync"]
    iamRoleARN: "arn:aws:iam::740994137039:role/k8s-mgmt-billsplit"
    schedule: "0 0 * * *"
