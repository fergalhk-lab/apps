  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BillSplit</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; padding: 1rem; max-width: 600px; margin: 0 auto; }
      button { cursor: pointer; padding: 0.5rem 1rem; }
      input, select { padding: 0.4rem; width: 100%; margin-bottom: 0.5rem; }
      .error { color: red; margin: 0.5rem 0; }
      .card { border: 1px solid #ddd; border-radius: 4px; padding: 1rem; margin-bottom: 0.75rem; }
      .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; }
      .modal { background: white; padding: 1.5rem; border-radius: 6px; width: 100%; max-width: 420px; }
