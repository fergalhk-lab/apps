# .github/workflows/ci.yml
name: CI

on:
  push:
  pull_request:

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - id: matrix
        run: echo "matrix=$(go run ./util/ci/matrix-generator)" >> "$GITHUB_OUTPUT"

  build-test:
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build image
        env:
          DOCKERFILE: ${{ matrix.dockerfile }}
          IMAGE: ${{ matrix.image }}
          SHA: ${{ github.sha }}
        run: |
          docker build -f "$DOCKERFILE" -t "$IMAGE:$SHA" .

      - name: Run tests
        env:
          TESTS_JSON: ${{ toJSON(matrix.tests) }}
        run: |
          set -o pipefail
          echo "$TESTS_JSON" | jq -r '.[] | @base64' | while IFS= read -r encoded; do
            entry=$(echo "$encoded" | base64 -d)
            name=$(echo "$entry" | jq -r '.name')
            cmd=$(echo "$entry" | jq -r '.run')
            echo "::group::Test: $name"
            bash -c "$cmd"
            status=$?
            echo "::endgroup::"
            if [ $status -ne 0 ]; then exit $status; fi
          done

      - name: Configure AWS credentials
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ matrix.ecr_role_arn }}
          aws-region: ${{ matrix.ecr_region }}

      - name: Login to ECR
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push image
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        env:
          IMAGE: ${{ matrix.image }}
          SHA: ${{ github.sha }}
        run: docker push "$IMAGE:$SHA"

  ci:
    needs: [build-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check build-test result
        run: |
          result="${{ needs.build-test.result }}"
          if [[ "$result" != "success" && "$result" != "skipped" ]]; then
            echo "build-test result: $result"
            exit 1
          fi
