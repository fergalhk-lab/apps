# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - id: matrix
        run: echo "matrix=$(go run ./util/ci/matrix-generator)" >> "$GITHUB_OUTPUT"

  build-test:
    name: ${{ matrix.name }}
    needs: generate-matrix
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build image
        env:
          DOCKERFILE: ${{ matrix.dockerfile }}
          IMAGE: ${{ matrix.image }}
          SHA: ${{ github.sha }}
        run: |
          docker build -f "$DOCKERFILE" -t "$IMAGE:$SHA" .

      - name: Run tests
        env:
          TESTS_JSON: ${{ toJSON(matrix.tests) }}
        run: |
          set -o pipefail
          echo "$TESTS_JSON" | jq -r '.[] | @base64' | while IFS= read -r encoded; do
            entry=$(echo "$encoded" | base64 -d)
            name=$(echo "$entry" | jq -r '.name')
            cmd=$(echo "$entry" | jq -r '.run')
            echo "::group::Test: $name"
            bash -c "$cmd"
            status=$?
            echo "::endgroup::"
            if [ $status -ne 0 ]; then exit $status; fi
          done

      - name: Configure AWS credentials
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ matrix.ecr_role_arn }}
          aws-region: ${{ matrix.ecr_region }}

      - name: Login to ECR
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push image
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        env:
          IMAGE: ${{ matrix.image }}
          SHA: ${{ github.sha }}
        run: docker push "$IMAGE:$SHA"

  ci:
    needs: [build-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check build-test result
        run: |
          result="${{ needs.build-test.result }}"
          if [[ "$result" != "success" && "$result" != "skipped" ]]; then
            echo "build-test result: $result"
            exit 1
          fi

  deploy:
    needs: [generate-matrix, build-test]
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deployer
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download \
            --repo fergalhk-lab/deployer \
            --pattern "deployer_*_linux_amd64.tar.gz" \
            --dir /tmp/deployer-dl
          tar -xzf /tmp/deployer-dl/deployer_*_linux_amd64.tar.gz -C /tmp/deployer-dl
          sudo mv /tmp/deployer-dl/deployer /usr/local/bin/deployer

      - name: Get GitHub App token
        id: token
        uses: ./.github/actions/github-app-token
        with:
          repositories: k8s-deployments

      - name: Check out k8s-deployments
        uses: actions/checkout@v4
        with:
          repository: fergalhk-lab/k8s-deployments
          token: ${{ steps.token.outputs.token }}
          path: k8s-deployments

      - name: Render and write manifests
        env:
          MATRIX: ${{ needs.generate-matrix.outputs.matrix }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          echo "$MATRIX" | jq -c '.include[]' | while IFS= read -r entry; do
            app=$(echo "$entry" | jq -r '.name')
            path=$(echo "$entry" | jq -r '.path')
            cluster=$(echo "$entry" | jq -r '.cluster')
            mkdir -p "k8s-deployments/clusters/$cluster/$app"
            sed "s/IMAGE_TAG/$SHA/g" "${path}deploy.yaml" > /tmp/deploy-rendered.yaml
            deployer /tmp/deploy-rendered.yaml \
              > "k8s-deployments/clusters/$cluster/$app/manifests.yaml"
          done

      - name: Commit and push
        working-directory: k8s-deployments
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add clusters/
          if git diff --staged --quiet; then
            echo "No changes to manifests."
            exit 0
          fi
          git commit -m "chore: deploy apps@${{ github.sha }}"
          git push
