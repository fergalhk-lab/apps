<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dog Cam</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; height: 100vh; display: flex; align-items: center; justify-content: center; }
    #feed { max-width: 100%; max-height: 100vh; display: block; }
    #overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      color: #fff; font-family: sans-serif; font-size: 1.2rem;
      align-items: center; justify-content: center;
    }
  </style>
</head>
<body>
  <img id="feed" src="" alt="dog cam feed">
  <div id="overlay">Camera offline</div>
  <script>
    const img = document.getElementById('feed');
    const overlay = document.getElementById('overlay');
    let lastFrameAt = Date.now();

    const es = new EventSource('/stream');
    es.addEventListener('frame', e => {
      img.src = 'data:image/jpeg;base64,' + e.data;
      lastFrameAt = Date.now();
      overlay.style.display = 'none';
    });
    es.onerror = () => { overlay.style.display = 'flex'; };

    setInterval(() => {
      if (Date.now() - lastFrameAt > 5000) {
        overlay.style.display = 'flex';
      }
    }, 1000);
  </script>
</body>
</html>
